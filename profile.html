<html lang="en">
<head>

    <link rel="stylesheet" href="css/profile.css">
    <!-- Lucide Icons -->

  <link rel="stylesheet" href="css/motion.css?v=2">
  <script src="js/motion.js?v=2" defer></script>
</head>
<body>
    
    <!-- Navigation Bar -->

        <a href="index.html" class="flex flex-col items-center min-w-[100px]">
          <div style="display:flex; letter-spacing:-0.05em; line-height:1;">
            <img src="assets/Document.png" alt="Logo" height="50" style="height: 50px; width: auto;" onerror="this.src='https://placehold.co/100x40?text=Logo';" />
          </div>
        </a>

        <!-- Desktop Navigation -->
        <div class="hidden md:flex nav-desktop-container">
          <a href="index.html" class="nav-link">
            <i data-lucide="home" style="width: 18px; height: 18px; stroke-width: 2px;"></i>
            <span class="nav-link-text">SEARCH FOR GAME</span>
          </a>
          <a href="add-game.html" class="nav-link">
            <i data-lucide="plus-circle" style="width: 18px; height: 18px; stroke-width: 2px;"></i>
            <span class="nav-link-text">CONTRIBUTE</span>
          </a>
          <a href="about.html" class="nav-link">
            <i data-lucide="info" style="width: 18px; height: 18px; stroke-width: 2.5px;"></i>
            <span class="nav-link-text">ABOUT</span>
          </a>
        </div>

        <!-- Right Section: Profile & Mobile Menu -->
        <div class="flex items-center gap-4 min-w-[100px] justify-end">
          <a href="profile.html" class="navbar-profile-btn" id="authBtn">
            <i data-lucide="user" class="lucide-icon"></i>
          </a>
          <!-- Mobile Menu Button -->
          <button id="mobile-menu-btn" class="md:hidden mobile-menu-btn">
            <i data-lucide="menu" id="mobile-menu-icon" style="width: 24px; height: 24px;"></i>
          </button>
        </div>
      </div>

      <!-- Mobile Navigation -->
      <div id="mobile-menu" class="hidden md:hidden">
        <div class="flex flex-col gap-1">
          <a href="index.html" class="mobile-nav-link">
            <i data-lucide="home" style="width: 20px; height: 20px;"></i>
            SEARCH FOR GAME
          </a>
          <a href="add-game.html" class="mobile-nav-link">
            <i data-lucide="plus-circle" style="width: 20px; height: 20px;"></i>
            CONTRIBUTE
          </a>
          <a href="about.html" class="mobile-nav-link">
            <i data-lucide="info" style="width: 20px; height: 20px;"></i>
            ABOUT
          </a>
        </div>
      </div>
    </nav>


    <!-- Main Content -->
    <main>
      <div class="profile-page">
        <div class="profile-container">
          
          <!-- Navigation / Back Button -->
          <div class="profile-header">
            <button type="button" class="back-btn" onclick="history.back()">
              <div class="back-icon-wrap">
                <i data-lucide="arrow-left" style="width:24px; height:24px;"></i>
              </div>
              <span class="back-text">Back</span>
            </button>
            <button type="button" id="user-logout-btn" class="logout-btn">
              <i data-lucide="log-out" style="width:16px; height:16px;"></i>
              <span>Sign out</span>
            </button>
          </div>

          <!-- Photo de profil (avatar) -->
          <div id="profile-avatar-card" class="profile-avatar-card">
            <div class="profile-avatar-wrap">
              <img id="profile-avatar-img" src="assets/avatars/avatar-1.png" alt="Avatar"
                onerror="this.src='assets/avatars/avatar-1.png';" />
            </div>
            <div class="profile-avatar-info">
              <p id="profile-user-pseudo" class="profile-user-pseudo">—</p>
              <p id="profile-user-email" class="profile-user-email">—</p>
              <p id="profile-user-country" class="profile-user-country"></p>
              <button type="button" id="change-avatar-btn" class="change-avatar-btn">
                <i data-lucide="image" style="width:14px; height:14px;"></i> Change photo
              </button>
            </div>
          </div>
          <div id="avatar-picker" class="avatar-grid" style="display:none; margin-bottom:1.5rem;"></div>
          <div id="avatar-picker-msg" style="display:none; margin-bottom:1rem; font-size:0.8rem; font-weight:700;"></div>

          <!-- Tabs -->
          <div class="profile-tabs" id="profile-tabs">
            <!-- Tabs added via JS -->
          </div>

          <!-- Content Tab -->
          <div class="profile-content" id="profile-content">
            <!-- Rendered via JS -->
          </div>

        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="max-w-7xl mx-auto footer-grid">
        <!-- Left Column -->
        <div class="footer-brand">
          <h2>Serious Game<br />Catalogue</h2>
          <p>A leading platform for<br />serious educational games.</p>
        </div>

        <!-- Middle Column -->
        <div>
          <h3 class="footer-heading">
            <span class="footer-indicator-orange"></span>
            NAVIGATION
          </h3>
          <nav class="footer-nav">
            <a href="index.html" class="footer-link">
              <i data-lucide="home" style="width:20px; height:20px;"></i>
              HOME
            </a>
            <a href="add-game.html" class="footer-link">
              <i data-lucide="plus-circle" style="width:20px; height:20px;"></i>
              ADD SERIOUS GAME
            </a>
            <a href="about.html" class="footer-link">
              <i data-lucide="info" style="width:20px; height:20px;"></i>
              ABOUT
            </a>
            <a href="profile.html" class="footer-link">
              <i data-lucide="user" style="width:20px; height:20px;"></i>
              PROFILE
            </a>
          </nav>

        </div>

        <!-- Right Column -->
        <div style="display: flex; flex-direction: column; justify-content: space-between;">
          <div>
            <h3 class="footer-heading">
              <span class="footer-indicator-red"></span>
              PORTAL
            </h3>
            <a href="admin.html" class="footer-link">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
              ADMIN ACCESS
            </a>
          </div>
          <div style="margin-top: 2rem;">
            <p style="color: #9ca3af; font-size: 0.875rem; margin-bottom: 0.5rem;">2026 Serious Games Society</p>
          </div>
        </div>
      </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/admin-auth.js"></script>
    <script>
      // Profile : affiche TOUS les jeux soumis par l'utilisateur connecté + leur statut
      document.addEventListener('DOMContentLoaded', () => {
        const API_BASE = (window.adminAuth && window.adminAuth.API_BASE)
          || 'https://urielthebigboss-seirousgamecatalogue.hf.space';
        const token = localStorage.getItem('user_token');

        const tabsContainer = document.getElementById('profile-tabs');
        const contentContainer = document.getElementById('profile-content');

        // Mappe le statut backend -> classe CSS + libellé affiché
        function statusBadge(status) {
          const s = (status || '').toLowerCase();
          if (s === 'approved' || s === 'valid' || s === 'validated')
            return { cls: 'badge-completed', label: 'Validated' };
          if (s === 'refused' || s === 'rejected' || s === 'failed')
            return { cls: 'badge-failed', label: 'Refused' };
          return { cls: 'badge-waiting', label: 'Pending' };
        }

        function renderTabs() {
          tabsContainer.innerHTML = `
            <button class="tab-btn" style="box-shadow: 0 0 0 2px #dbeafe;" data-id="games">
              <i data-lucide="gamepad-2" style="width:16px; height:16px;"></i> My Games
            </button>`;
          if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function renderMessage(html) {
          contentContainer.innerHTML = `
            <h3 class="section-heading">
              <i data-lucide="gamepad-2" style="color:#3b82f6; width:20px; height:20px;"></i> My Games
            </h3>
            <div style="text-align:center; padding:3rem 1rem; color:#9ca3af; font-weight:700;">${html}</div>`;
          if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function gameImage(g) {
          if (g.image) return g.image;
          if (window.gameImage) return window.gameImage(g.link, g.title, 800, 600);
          return 'https://placehold.co/800x600/e5e7eb/9ca3af?text=Game';
        }

        function renderGames(games) {
          if (!games || games.length === 0) {
            renderMessage("You haven't submitted any games yet.<br>Click « Contribute » to add one.");
            return;
          }
          const cardsHtml = games.map(g => {
            const b = statusBadge(g.status);
            const rating = (g.rating != null) ? Number(g.rating).toFixed(1) : '—';
            return `
              <div class="profile-game-card">
                <div class="status-badge ${b.cls}"><span>${b.label}</span></div>
                <div class="game-img-container">
                  <img src="${gameImage(g)}" alt="${g.title || 'Jeu'}" class="game-img"
                    onerror="this.src='https://placehold.co/800x600/e5e7eb/9ca3af?text=Game';" />
                  <div class="game-img-gradient"></div>
                </div>
                <div class="game-info">
                  <h4 class="game-title">${g.title || 'Sans titre'}</h4>
                  <p class="game-category">${g.domaine || '—'}</p>
                  <div class="game-footer">
                    <div class="rating-box">
                      <i data-lucide="star" class="rating-icon"></i>
                      <span class="rating-text">${rating}</span>
                    </div>
                    <a href="game.html?id=${g.id}" class="game-link">View Details</a>
                  </div>
                </div>
              </div>`;
          }).join('');

          contentContainer.innerHTML = `
            <h3 class="section-heading">
              <i data-lucide="gamepad-2" style="color:#3b82f6; width:20px; height:20px;"></i> My Games
            </h3>
            <div class="games-grid">${cardsHtml}</div>`;
          if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        async function loadMyGames() {
          if (!token) {
            renderMessage('Sign in to see your submitted games.');
            return;
          }
          renderMessage('Loading your games…');
          try {
            const res = await fetch(`${API_BASE}/games/mine`, {
              headers: { Authorization: 'Bearer ' + token }
            });
            if (res.status === 401 || res.status === 403) {
              renderMessage('Session expired. Sign in again to see your games.');
              return;
            }
            if (!res.ok) { renderMessage('Unable to load your games right now.'); return; }
            const data = await res.json();
            renderGames(data.games || []);
          } catch (_) {
            renderMessage('Server unreachable. Try again later.');
          }
        }

        /* ===== Photo de profil (avatar) ===== */
        const avatarImg = document.getElementById('profile-avatar-img');
        const emailEl = document.getElementById('profile-user-email');
        const countryEl = document.getElementById('profile-user-country');
        const changeBtn = document.getElementById('change-avatar-btn');
        const picker = document.getElementById('avatar-picker');
        const pickerMsg = document.getElementById('avatar-picker-msg');
        const N = window.PROFILE_AVATAR_COUNT || 12;
        let currentAvatar = 1;

        function avatarSrc(id) {
          return window.avatarUrl ? window.avatarUrl(id) : `assets/avatars/avatar-${id}.png`;
        }
        function setAvatar(id) {
          currentAvatar = id || 1;
          if (avatarImg) avatarImg.src = avatarSrc(currentAvatar);
        }
        function showMsg(text, ok) {
          if (!pickerMsg) return;
          pickerMsg.textContent = text || '';
          pickerMsg.style.display = text ? 'block' : 'none';
          pickerMsg.style.color = ok ? '#059669' : '#dc2626';
        }

        async function saveAvatar(id) {
          if (!token) { showMsg('Sign in to change your photo.', false); return; }
          try {
            const res = await fetch(`${API_BASE}/user/me`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
              body: JSON.stringify({ img_profil: id })
            });
            if (!res.ok) { showMsg('Update failed.', false); return; }
            const me = await res.json();
            setAvatar(me.img_profil);
            window.currentUserAvatar = me.img_profil;
            if (me.img_profil) localStorage.setItem('user_avatar', me.img_profil);
            else localStorage.removeItem('user_avatar');
            showMsg('Profile photo updated ✓', true);
            if (picker) picker.style.display = 'none';
          } catch (_) {
            showMsg('Server unreachable.', false);
          }
        }

        function buildPicker() {
          if (!picker || picker.childElementCount) return;
          for (let i = 1; i <= N; i++) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'avatar-option' + (i === currentAvatar ? ' selected' : '');
            b.dataset.id = i;
            b.innerHTML = '<img src="' + avatarSrc(i) + '" alt="Avatar ' + i + '">';
            b.addEventListener('click', () => {
              picker.querySelectorAll('.avatar-option').forEach(x => x.classList.remove('selected'));
              b.classList.add('selected');
              saveAvatar(i);
            });
            picker.appendChild(b);
          }
        }

        if (changeBtn && picker) {
          changeBtn.addEventListener('click', () => {
            buildPicker();
            picker.style.display = (picker.style.display === 'none') ? 'grid' : 'none';
            showMsg('', true);
          });
        }

        async function loadMe() {
          if (!token) { if (emailEl) emailEl.textContent = 'Not signed in'; return; }
          try {
            const res = await fetch(`${API_BASE}/user/me`, { headers: { Authorization: 'Bearer ' + token } });
            if (!res.ok) return;
            const me = await res.json();
            const pseudoEl = document.getElementById('profile-user-pseudo');
            if (pseudoEl) pseudoEl.textContent = me.pseudo || me.mail || 'Joueur';
            if (emailEl) emailEl.textContent = me.mail || '';
            if (countryEl) {
              const bits = [me.pays, me.year_born ? ('Born in ' + me.year_born) : ''].filter(Boolean);
              countryEl.textContent = bits.join(' · ');
            }
            setAvatar(me.img_profil || 1);
            if (me.img_profil) localStorage.setItem('user_avatar', me.img_profil);
            else localStorage.removeItem('user_avatar');
          } catch (_) {}
        }

        const logoutBtn = document.getElementById('user-logout-btn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('user_token');
            localStorage.removeItem('user_avatar');
            window.location.href = 'index.html';
          });
        }

        renderTabs();
        loadMyGames();
        loadMe();
      });
    </script>
</body>
</html>
